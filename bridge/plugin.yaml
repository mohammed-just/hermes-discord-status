name: discord-status
version: 0.1.0
description: Loopback-only live Hermes session status for Discord channel routes.
author: local
kind: standalone
provides_hooks:
  - on_session_start
  - on_session_end
  - on_session_finalize
  - on_session_reset
  - pre_llm_call
  - post_llm_call
  - pre_api_request
  - post_api_request
  - api_request_error
  - pre_tool_call
  - post_tool_call
  - subagent_start
  - subagent_stop
